name: Commit build

on:
  push:
    branches:
      - master

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: git pull origin master

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6

      - name: Get Dependencies
        run: flutter pub get

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pre-build LibResolveURL wheel
        # LibResolveURL jest tylko z gita (nie ma na PyPI). Budujemy z niego
        # wheel-a (pure Python = py3-none-any.whl, czyli "binary" dla pip-a)
        # i wskazujemy go potem przez --find-links przy instalacji do
        # site-packages.
        run: |
          set -eux
          mkdir -p ./wheels
          python -m pip install --upgrade pip wheel
          python -m pip wheel "git+https://github.com/majusss/LibResolveURL.git" \
            --no-deps -w ./wheels
          ls -la ./wheels/

      - name: Install Python packages into per-arch site-packages
        # KLUCZOWE: plugin gradle serious_python_android oczekuje, ze
        # SERIOUS_PYTHON_SITE_PACKAGES wskazuje na katalog z podkatalogami
        # per architektura (arm64-v8a, armeabi-v7a, x86_64). Stamtad bierze
        # paczki do APK - to jest sposob, w jaki autor robi to lokalnie.
        #
        # WAZNE: pydantic_core (zaleznosc fastapi) ma natywne C-extensions
        # ktore MUSZA byc skompilowane dla Androida ARM, nie dla hosta CI
        # (x86_64 Linux). Uzywamy `pip --platform=android_X_arch` zeby
        # wymusic pobranie wheel-a dla wlasciwej platformy zamiast budowania
        # ze zrodel. Pre-built android wheele sa na https://pypi.flet.dev.
        run: |
          set -eux
          SITE_DIR="${{ github.workspace }}/.site-packages"
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"

          # Mapowanie nazw arch (Android NDK -> pip platform tag)
          # Plugin gradle uzywa: arm64-v8a, armeabi-v7a, x86_64
          # Pip oczekuje: android_21_arm64_v8a, android_21_armeabi_v7a, android_21_x86_64
          install_for_arch() {
            local ARCH="$1"
            local PIP_PLATFORM="$2"
            local ARCH_DIR="$SITE_DIR/$ARCH"
            mkdir -p "$ARCH_DIR"
            echo "=== Instaluje pakiety dla $ARCH ($PIP_PLATFORM) do $ARCH_DIR ==="
            python -m pip install \
              --target="$ARCH_DIR" \
              --platform="$PIP_PLATFORM" \
              --python-version=3.12 \
              --implementation=cp \
              --only-binary=:all: \
              --extra-index-url=https://pypi.flet.dev \
              --find-links=./wheels \
              fastapi uvicorn six LibResolveURL
            echo "=== Zawartosc $ARCH_DIR (top-level): ==="
            ls "$ARCH_DIR" | head -40
            echo "=== Czy pydantic_core ma natywny .so? ==="
            find "$ARCH_DIR/pydantic_core" -type f | head -10 || true
          }

          install_for_arch arm64-v8a   android_21_arm64_v8a
          install_for_arch armeabi-v7a android_21_armeabi_v7a
          install_for_arch x86_64      android_21_x86_64

          echo "SERIOUS_PYTHON_SITE_PACKAGES=$SITE_DIR" >> "$GITHUB_ENV"
          echo "Calkowity rozmiar site-packages:"
          du -sh "$SITE_DIR"

      - name: Build Python app package (serious_python)
        # Buduje app.zip ze samym main.py (bez site-packages - one
        # zostaly osobno zainstalowane w poprzednim kroku do SITE_DIR).
        # WAZNE: usuwamy stare app.zip z repo bo zawiera stary main.py
        # uzywajacy flask, podczas gdy main.py w repo uzywa fastapi.
        run: |
          set -eux
          rm -f app/app.zip app/app.zip.hash
          dart pub global activate serious_python 0.9.11
          # --skip-site-packages: zbuduj app.zip tylko ze zrodel,
          # nie probuj pakowac zaleznosci pip (te juz mamy w SITE_DIR).
          dart run serious_python:main package app/temp \
            -p Android \
            -a app/app.zip \
            --skip-site-packages
          ls -la app/
          echo "Rozmiar app.zip:"
          du -h app/app.zip
          echo "Zawartosc app.zip:"
          unzip -l app/app.zip | head -30
          echo "Pierwsze linie main.py wewnatrz app.zip:"
          unzip -p app/app.zip main.py | head -15

      - name: Prepare signing config
        # W forku (bez KEYSTORE_BASE64 secret) generujemy self-signed
        # keystore zeby build dalej dzialal. APK podpisany takim kluczem
        # instaluje sie normalnie na telefonie - po prostu nie jest to
        # oryginalny podpis autora.
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -eu
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Wykryto secret KEYSTORE_BASE64 - uzywam go."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          else
            echo "Brak secret KEYSTORE_BASE64 - generuje ephemeralny keystore."
            keytool -genkey -noprompt \
              -keystore android/app/keystore.jks \
              -storetype PKCS12 \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=PureVideo CI,O=CI,C=PL"
            {
              echo "storePassword=android"
              echo "keyPassword=android"
              echo "keyAlias=androiddebugkey"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purevideo-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk


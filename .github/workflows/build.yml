name: Commit build

on:
  push:
    branches:
      - master

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: git pull origin master

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6

      - name: Get Dependencies
        run: flutter pub get

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python app package (serious_python)
        # serious_python wymaga skompilowanego CPython runtime + site-packages
        # spakowanego do app/app.zip. Komenda 'package' pobiera natywne .so
        # dla Android i buduje archiwum z interpreterem + zaleznosciami.
        #
        # WAZNE: usuwamy stare app.zip z repo bo czesto jest niesynchronizowane
        # ze zrodlami (autor commitowal app.zip ze starym main.py uzywajacym
        # flask, podczas gdy main.py w repo uzywa juz fastapi - skutkuje to
        # crashem 'ModuleNotFoundError: flask' przy uruchomieniu Pythona w APK).
        run: |
          set -eux
          rm -f app/app.zip app/app.zip.hash
          dart pub global activate serious_python
          dart run serious_python:main package app/temp \
            --mobile \
            --platform android \
            --asset-dir app
          ls -la app/
          echo "Zawartosc app.zip:"
          unzip -l app/app.zip | head -30 || true
          # Ustaw zmienna - plugin gradle sprawdza czy istnieje, nawet jesli
          # app.zip juz zawiera wszystko.
          SITE_DIR="${{ github.workspace }}/.site-packages"
          mkdir -p "$SITE_DIR"
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$SITE_DIR" >> "$GITHUB_ENV"

      - name: Prepare signing config
        # W forku (bez KEYSTORE_BASE64 secret) generujemy self-signed
        # keystore zeby build dalej dzialal. APK podpisany takim kluczem
        # instaluje sie normalnie na telefonie - po prostu nie jest to
        # oryginalny podpis autora.
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -eu
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Wykryto secret KEYSTORE_BASE64 - uzywam go."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          else
            echo "Brak secret KEYSTORE_BASE64 - generuje ephemeralny keystore."
            keytool -genkey -noprompt \
              -keystore android/app/keystore.jks \
              -storetype PKCS12 \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=PureVideo CI,O=CI,C=PL"
            {
              echo "storePassword=android"
              echo "keyPassword=android"
              echo "keyAlias=androiddebugkey"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purevideo-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk


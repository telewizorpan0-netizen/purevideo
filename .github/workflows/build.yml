name: Commit build

on:
  push:
    branches:
      - master

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: git pull origin master

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6

      - name: Get Dependencies
        run: flutter pub get

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Use pre-built app.zip from repo
        # KLUCZOWA ZMIANA: NIE rebuildujemy app.zip - uzywamy gotowego
        # archiwum z repo. Autor commitowal app.zip z pelnym pre-built
        # bundle (Flask serwer + LibResolveURL z PRYWATNYMI pluginami
        # dla polskich hosterow boosteradx/ultrastream/vidara/voe/etc.,
        # ktorych nie ma w public github.com/majusss/LibResolveURL).
        #
        # Plugin gradle serious_python_android wymaga zmiennej
        # SERIOUS_PYTHON_SITE_PACKAGES - ale wartosc nie ma znaczenia,
        # bo wszystkie zaleznosci sa juz w app.zip. Tworzymy pusty
        # katalog jako placeholder.
        run: |
          set -eux
          if [ ! -f app/app.zip ]; then
            echo "::error::Brakuje app/app.zip w repo!"
            exit 1
          fi
          echo "Uzywamy istniejacego app.zip:"
          du -h app/app.zip
          echo "Sprawdzam zawartosc..."
          unzip -l app/app.zip | head -10
          unzip -l app/app.zip | grep -E "(libresolveurl|main.py|LibResolveURL)" | head -10 || true
          # Placeholder - plugin gradle tylko sprawdza istnienie zmiennej
          SITE_DIR="${{ github.workspace }}/.site-packages"
          mkdir -p "$SITE_DIR/arm64-v8a" "$SITE_DIR/armeabi-v7a" "$SITE_DIR/x86_64"
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$SITE_DIR" >> "$GITHUB_ENV"

      - name: Prepare signing config
        # W forku (bez KEYSTORE_BASE64 secret) generujemy self-signed
        # keystore zeby build dalej dzialal. APK podpisany takim kluczem
        # instaluje sie normalnie na telefonie - po prostu nie jest to
        # oryginalny podpis autora.
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -eu
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Wykryto secret KEYSTORE_BASE64 - uzywam go."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          else
            echo "Brak secret KEYSTORE_BASE64 - generuje ephemeralny keystore."
            keytool -genkey -noprompt \
              -keystore android/app/keystore.jks \
              -storetype PKCS12 \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=PureVideo CI,O=CI,C=PL"
            {
              echo "storePassword=android"
              echo "keyPassword=android"
              echo "keyAlias=androiddebugkey"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purevideo-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk


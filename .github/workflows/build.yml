name: Commit build

on:
  push:
    branches:
      - master

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: git pull origin master

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6

      - name: Get Dependencies
        run: flutter pub get

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Serious Python site-packages
        # serious_python_android/android/build.gradle wymaga zmiennej
        # SERIOUS_PYTHON_SITE_PACKAGES - nawet jesli app.zip ma juz bundle
        # z zaleznosciami, plugin gradle i tak sprawdza istnienie zmiennej.
        # Instalujemy wymagane pakiety Pythona do lokalnego katalogu
        # zeby plugin mial czym przechwycic i - w razie czego - uzupelnic
        # app.zip na etapie buildu.
        run: |
          set -eux
          SITE_DIR="${{ github.workspace }}/.site-packages"
          mkdir -p "$SITE_DIR"
          if [ -f app/temp/requirements.txt ]; then
            python -m pip install --upgrade pip
            # -t: target dir; pure-Python packages (fastapi, uvicorn, libresolveurl) nie wymagaja natywnej kompilacji.
            python -m pip install --no-cache-dir -r app/temp/requirements.txt -t "$SITE_DIR" || true
          fi
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$SITE_DIR" >> "$GITHUB_ENV"
          echo "Zawartosc site-packages:"
          ls "$SITE_DIR" | head -20 || true

      - name: Prepare signing config
        # W forku (bez KEYSTORE_BASE64 secret) generujemy self-signed
        # keystore zeby build dalej dzialal. APK podpisany takim kluczem
        # instaluje sie normalnie na telefonie - po prostu nie jest to
        # oryginalny podpis autora.
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -eu
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Wykryto secret KEYSTORE_BASE64 - uzywam go."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          else
            echo "Brak secret KEYSTORE_BASE64 - generuje ephemeralny keystore."
            keytool -genkey -noprompt \
              -keystore android/app/keystore.jks \
              -storetype PKCS12 \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=PureVideo CI,O=CI,C=PL"
            {
              echo "storePassword=android"
              echo "keyPassword=android"
              echo "keyAlias=androiddebugkey"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purevideo-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk


name: Commit build

on:
  push:
    branches:
      - master

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Latest Changes
        run: git pull origin master

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6

      - name: Get Dependencies
        run: flutter pub get

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pre-build LibResolveURL wheel
        # serious_python wymusza --only-binary :all: na pip install,
        # co blokuje paczki z git+https. LibResolveURL jest dostepne TYLKO
        # z gita (nie ma na PyPI), wiec budujemy z niego wheel-a (pure
        # python, czyli universal py3-none-any.whl) i wskazujemy go potem
        # przez --find-links.
        run: |
          set -eux
          mkdir -p ./wheels
          python -m pip install --upgrade pip wheel
          python -m pip wheel "git+https://github.com/majusss/LibResolveURL.git" \
            --no-deps -w ./wheels
          ls -la ./wheels/

      - name: Build Python app package (serious_python)
        id: build_python
        # WAZNE: usuwamy stare app.zip z repo bo jest niesynchronizowane
        # ze zrodlami (zawiera stary main.py uzywajacy flask). Krok ma
        # 'continue-on-error' - jak nie zadziala, fallback uzyje istniejacego
        # app.zip a my pokazemy ostrzezenie.
        continue-on-error: true
        run: |
          set -eux
          rm -f app/app.zip app/app.zip.hash
          dart pub global activate serious_python 0.9.11
          echo "Requirements input:"
          cat app/temp/requirements.txt
          echo "---"
          # serious_python 0.9.11 ma takie samo CLI jak 1.0.0 (-p Android, -a
          # i -r). Nie mozna uzyc "-r path/to/file" jako wartosci `-r` bo
          # serious_python_le parsuje argument i zostawia wiodaca spacje
          # ('Could not open requirements file: " /home/..."'). Dlatego
          # podajemy KAZDY pakiet jako osobny `-r` i opcje pip-a tez:
          dart run serious_python:main package app/temp \
            -p Android \
            -a app/app.zip \
            -r "--find-links=${{ github.workspace }}/wheels" \
            -r "fastapi" \
            -r "uvicorn" \
            -r "six" \
            -r "LibResolveURL" \
            --verbose
          ls -la app/
          echo "Rozmiar app.zip:"
          du -h app/app.zip
          echo "Zawartosc app.zip (top 60):"
          unzip -l app/app.zip | head -60
          echo "Czy fastapi/libresolveurl sa w bundle?"
          unzip -l app/app.zip | grep -iE "(fastapi|uvicorn|libresolveurl|six)" | head -20

      - name: Validate app.zip
        run: |
          set -eu
          if [ ! -f app/app.zip ]; then
            echo "::error::Brak pliku app/app.zip - rebuild padl i nie ma fallbacku."
            exit 1
          fi
          echo "Walidacja app.zip:"
          du -h app/app.zip
          if unzip -p app/app.zip main.py 2>/dev/null | head -20 | grep -q "from fastapi"; then
            echo "OK: main.py uzywa fastapi (nowy)"
          elif unzip -p app/app.zip main.py 2>/dev/null | head -20 | grep -q "from flask"; then
            echo "::warning::app.zip zawiera STARY main.py z flask - Python serwer w APK nie zadziala. Zbuduj app.zip lokalnie i commituj (instrukcja w opisie zadania)."
          fi
          # Plugin gradle wymaga zmiennej, nawet jesli app.zip juz ma site-packages.
          SITE_DIR="${{ github.workspace }}/.site-packages"
          mkdir -p "$SITE_DIR"
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$SITE_DIR" >> "$GITHUB_ENV"

      - name: Prepare signing config
        # W forku (bez KEYSTORE_BASE64 secret) generujemy self-signed
        # keystore zeby build dalej dzialal. APK podpisany takim kluczem
        # instaluje sie normalnie na telefonie - po prostu nie jest to
        # oryginalny podpis autora.
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -eu
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Wykryto secret KEYSTORE_BASE64 - uzywam go."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          else
            echo "Brak secret KEYSTORE_BASE64 - generuje ephemeralny keystore."
            keytool -genkey -noprompt \
              -keystore android/app/keystore.jks \
              -storetype PKCS12 \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=PureVideo CI,O=CI,C=PL"
            {
              echo "storePassword=android"
              echo "keyPassword=android"
              echo "keyAlias=androiddebugkey"
              echo "storeFile=keystore.jks"
            } > android/key.properties
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purevideo-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

